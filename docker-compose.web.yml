services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8081:80"
    volumes:
      - ./infra/nginx/conf.d/kvh-http.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/dist:/usr/share/nginx/html:ro
      - ./infra/nginx/www:/var/www/certbot
      - ./infra/certs/letsencrypt:/etc/letsencrypt
    restart: unless-stopped
    networks:
      - frontend
      - backend

  certbot:
    image: certbot/certbot:latest
    profiles: ["certbot"]
    volumes:
      - ./infra/nginx/www:/var/www/certbot
      - ./infra/certs/letsencrypt:/etc/letsencrypt
    entrypoint: /bin/sh -c
    command: "trap exit TERM; while :; do sleep 3600; done"
